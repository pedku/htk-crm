<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<title>Test Facturación</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/crm.css?v=1779833679">
</head>
<body style="padding:20px;">
<h3>Test Facturación</h3>
<div id="status" style="color:#fff;margin:10px 0;padding:10px;background:#1c1c1e;border-radius:8px;">
Probando...
</div>
<div id="output" style="color:#fff;margin:10px 0;"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
document.getElementById('status').textContent = 'jQuery: ' + (typeof $ !== 'undefined' ? '✅' : '❌') + ' | DataTables: ' + (typeof $.fn !== 'undefined' && typeof $.fn.dataTable !== 'undefined' ? '✅' : '❌');

// Test API call
fetch('/api/facturas')
  .then(r => r.json())
  .then(data => {
    document.getElementById('status').innerHTML += '<br>API: ✅ ' + data.length + ' facturas';
    document.getElementById('output').innerHTML = '<pre style="color:#0f0;">' + JSON.stringify(data, null, 2) + '</pre>';
  })
  .catch(e => {
    document.getElementById('status').innerHTML += '<br>API: ❌ ' + e.message;
  });
</script>
</body>
</html>
