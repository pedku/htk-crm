<div id="tab-facturacion" class="tab-content">
 <div class="d-flex justify-content-between align-items-center mb-3">
  <div>
   <h3 class="page-title mb-0"><i class="bi bi-receipt"></i> Facturación</h3>
   <small id="factStatusMsg" class="text-muted"></small>
  </div>
  <div class="d-flex gap-2 align-items-center">
   <select class="form-select form-select-sm" style="width:auto;" id="factEstadoFilter" onchange="filterFacturasDT()">
    <option value="">Todos los estados</option>
    <option value="borrador">Borrador</option>
    <option value="emitida">Emitida</option>
    <option value="pagada">Pagada</option>
    <option value="vencida">Vencida</option>
    <option value="anulada">Anulada</option>
   </select>
   <button class="btn btn-htk" onclick="showFacturaModal()"><i class="bi bi-plus-lg"></i> Nueva Factura</button>
  </div>
 </div>

 <div class="table-container">
  <div class="table-responsive">
   <table id="tableFacturas" class="table table-hover align-middle mb-0">
    <thead>
     <tr>
      <th>N° Factura</th>
      <th>Cliente</th>
      <th>Emisión</th>
      <th>Vence</th>
      <th>Total</th>
      <th>Estado</th>
      <th style="width:120px;">Acciones</th>
     </tr>
    </thead>
    <tbody id="factBody">
     <tr><td colspan="7" class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</td></tr>
    </tbody>
   </table>
  </div>
 </div>
 <div class="text-center py-4" id="factEmpty" style="display:none;">
  <i class="bi bi-receipt" style="font-size:2rem;opacity:0.3;"></i>
  <p class="mt-2 text-muted">Sin facturas registradas</p>
 </div>

</div>

<!-- Modal: Crear / Editar Factura -->
<div class="modal fade" id="facturaModal" tabindex="-1">
 <div class="modal-dialog modal-lg modal-dialog-scrollable">
  <div class="modal-content">
   <div class="modal-header">
    <h5 class="modal-title" id="facturaModalTitle">Nueva Factura</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
   </div>
   <div class="modal-body">
    <input type="hidden" id="factEditId">
    <div class="row g-3">
     <div class="col-md-6">
      <label class="form-label">Cliente *</label>
      <div class="client-search-wrapper">
       <input type="text" class="form-control" id="factClientSearch" placeholder="🔍 Buscar por nombre, documento o teléfono..." autocomplete="off" oninput="searchClientsDebounce()">
       <div class="client-search-dropdown" id="factClientDropdown" style="display:none;"></div>
      </div>
      <input type="hidden" id="factClientId">
     </div>
     <div class="col-md-6">
      <label class="form-label">O.T. (opcional)</label>
      <select class="form-select" id="factWoId">
       <option value="">Ninguna</option>
      </select>
     </div>
     <div class="col-md-6">
      <label class="form-label">Fecha Emisión</label>
      <input type="date" class="form-control" id="factFechaEmision">
     </div>
     <div class="col-md-6">
      <label class="form-label">Fecha Vencimiento</label>
      <input type="date" class="form-control" id="factFechaVenc">
     </div>
    </div>

    <!-- Items -->
    <div class="mt-4">
     <div class="d-flex justify-content-between align-items-center mb-2">
      <strong style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);">Items</strong>
      <button class="btn btn-sm" style="background:var(--htk-primary);color:#fff;" onclick="addFacturaItem()">
       <i class="bi bi-plus-lg"></i> Agregar
      </button>
     </div>
     <div class="d-flex gap-2 align-items-end mb-1 px-2" style="font-size:0.7rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;">
      <div style="flex:1;min-width:160px;">Descripción</div>
      <div style="width:90px;text-align:center;">Cant</div>
      <div style="width:120px;text-align:right;">Vr. Unitario</div>
      <div style="width:90px;text-align:center;">IVA %</div>
      <div style="width:60px;text-align:center;">Incl.</div>
      <div style="width:110px;text-align:right;">Total</div>
      <div style="width:36px;"></div>
     </div>
     <div id="factItemsContainer" style="max-height:300px;overflow-y:auto;">
     </div>
    </div>

    <!-- Totals preview -->
    <div class="mt-3 p-3" style="background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.05);">
     <div class="d-flex justify-content-end gap-4">
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.5);">Subtotal</small>
       <div id="factPreviewSub" style="font-weight:600;color:#fff;">$0</div>
      </div>
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.5);">IVA 19%</small>
       <div id="factPreviewIva" style="font-weight:600;color:#fff;">$0</div>
      </div>
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.5);">Descuento</small>
       <div><input type="number" class="form-control form-control-sm" id="factDescuento" value="0" min="0" step="1000" onchange="updateFacturaPreview()" style="width:100px;text-align:right;"></div>
      </div>
      <div style="text-align:right;">
       <small style="color:var(--htk-primary);">TOTAL</small>
       <div id="factPreviewTotal" style="font-size:1.2rem;font-weight:800;color:var(--htk-primary);">$0</div>
      </div>
     </div>
    </div>

    <!-- Notas -->
    <div class="row g-3 mt-3">
     <div class="col-md-6">
      <label class="form-label">Notas</label>
      <textarea class="form-control" id="factNotas" rows="2" placeholder="Condiciones, garantía..."></textarea>
     </div>
     <div class="col-md-6">
      <label class="form-label">Forma de Pago</label>
      <input type="text" class="form-control" id="factMetodoPago" placeholder="Transferencia · Efectivo · Datafono">
     </div>
    </div>
   </div>
   <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="button" class="btn" style="background:var(--htk-primary);color:#fff;" onclick="saveFactura()">Guardar</button>
   </div>
  </div>
 </div>
</div>

<!-- Modal: Ver / Detalle Factura -->
<div class="modal fade" id="facturaViewModal" tabindex="-1">
 <div class="modal-dialog modal-xl modal-dialog-scrollable">
  <div class="modal-content">
   <div class="modal-header">
    <h5 class="modal-title" id="facturaViewTitle">Factura</h5>
    <div class="d-flex gap-2" id="factViewActions">
     <button class="btn btn-sm btn-outline-light" onclick="imprimirFactura(currentFactViewId)" title="Imprimir"><i class="bi bi-printer"></i></button>
     <button class="btn btn-sm btn-outline-success" onclick="enviarFacturaWhatsApp(currentFactViewId)" title="Enviar WhatsApp"><i class="bi bi-whatsapp"></i></button>
     <button class="btn btn-sm btn-outline-warning" onclick="emitirFactura(currentFactViewId)" title="Emitir" id="btnEmitirFact"><i class="bi bi-send"></i></button>
     <button class="btn btn-sm btn-outline-success" onclick="pagarFactura(currentFactViewId)" title="Pagar" id="btnPagarFact"><i class="bi bi-check-circle"></i></button>
     <button class="btn btn-sm btn-outline-danger" onclick="anularFactura(currentFactViewId)" title="Anular"><i class="bi bi-x-circle"></i></button>
     <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
   </div>
   <div id="factPaymentBar" style="padding:0 20px 12px;display:none;">
    <div id="factPaymentInfo" style="background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:12px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <small style="color:rgba(255,255,255,0.4);font-size:0.78em;">ABONOS VINCULADOS</small>
          <div id="factPaymentProgress" style="margin-top:4px;display:flex;align-items:center;gap:12px;">
            <div class="progress" style="flex:1;height:8px;max-width:300px;background:rgba(255,255,255,0.1);border-radius:4px;">
              <div class="progress-bar" id="factPaymentBarFill" role="progressbar" style="width:0%;background:var(--htk-primary);border-radius:4px;"></div>
            </div>
            <span id="factPaymentText" style="font-size:0.85em;white-space:nowrap;">$0 / $0</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="factPaymentStatusBadge" style="font-size:0.78em;padding:3px 10px;border-radius:12px;"></span>
          <span id="factPaymentDetail" style="font-size:0.85em;"></span>
        </div>
      </div>
      <div id="factPaymentList" style="margin-top:8px;display:none;">
        <table style="width:100%;font-size:0.8em;border-collapse:collapse;">
          <thead><tr style="color:rgba(255,255,255,0.4);"><td style="padding:4px 0;">Fecha</td><td>Monto</td><td>Método</td><td>Ref</td></tr></thead>
          <tbody id="factPaymentListBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal-body p-0">
    <iframe id="facturaPreviewIframe" style="width:100%;height:75vh;border:none;background:#fff;" srcdoc="<p style='text-align:center;padding:40px;color:#999;font-family:sans-serif;'>Cargando factura...</p>"></iframe>
   </div>
  </div>
 </div>
</div>
