<div id="tab-facturacion" class="tab-content">
 <h3 class="page-title"><i class="bi bi-receipt"></i> Facturación</h3>
 <div id="factLoading" class="loading-overlay">
  <span class="spinner-border spinner-border-sm"></span> Cargando facturas...
 </div>
 <div id="factContent" style="display:none;">

  <!-- Filters -->
  <div class="d-flex flex-wrap gap-2 align-items-center mb-3" id="factFilters">
    <select class="form-select form-select-sm" style="width:auto;background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);" id="factEstadoFilter" onchange="filterFacturasDT()">
      <option value="">Todos los estados</option>
      <option value="borrador">Borrador</option>
      <option value="emitida">Emitida</option>
      <option value="pagada">Pagada</option>
      <option value="vencida">Vencida</option>
      <option value="anulada">Anulada</option>
    </select>
    <div class="dt-search" style="flex:1;max-width:260px;">
      <input type="search" class="form-control form-control-sm" placeholder="Buscar factura..." id="factSearchInput"
        style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;">
    </div>
    <button class="btn btn-sm" style="background:var(--htk-primary);color:#fff;margin-left:auto;" onclick="showFacturaModal()">
      <i class="bi bi-plus-lg"></i> Nueva Factura
    </button>
  </div>

  <!-- Table -->
  <div class="table-responsive">
   <table id="tableFacturas" class="table table-hover" style="width:100%;color:inherit;">
    <thead>
     <tr>
      <th>N° Factura</th>
      <th>Cliente</th>
      <th>Emisión</th>
      <th>Vence</th>
      <th>Total</th>
      <th>Estado</th>
      <th style="width:120px;">Acciones</th>
     </tr>
    </thead>
    <tbody id="factBody"></tbody>
   </table>
  </div>
  <div class="text-center py-4" id="factEmpty" style="display:none;color:rgba(255,255,255,0.3);">
    <i class="bi bi-receipt" style="font-size:2rem;"></i>
    <p class="mt-2">Sin facturas registradas</p>
  </div>

 </div>
</div>

<!-- Modal: Crear / Editar Factura -->
<div class="modal fade" id="facturaModal" tabindex="-1">
 <div class="modal-dialog modal-lg modal-dialog-scrollable">
  <div class="modal-content">
   <div class="modal-header">
    <h5 class="modal-title" id="facturaModalTitle">Nueva Factura</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
   </div>
   <div class="modal-body">
    <input type="hidden" id="factEditId">
    <div class="row g-3">
     <div class="col-md-6">
      <label class="form-label">Cliente *</label>
      <select class="form-select" id="factClientId" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);">
       <option value="">Seleccionar...</option>
      </select>
     </div>
     <div class="col-md-6">
      <label class="form-label">O.T. (opcional)</label>
      <select class="form-select" id="factWoId" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);">
       <option value="">Ninguna</option>
      </select>
     </div>
     <div class="col-md-6">
      <label class="form-label">Fecha Emisión</label>
      <input type="date" class="form-control" id="factFechaEmision" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);">
     </div>
     <div class="col-md-6">
      <label class="form-label">Fecha Vencimiento</label>
      <input type="date" class="form-control" id="factFechaVenc" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);">
     </div>
    </div>

    <!-- Items -->
    <div class="mt-4">
     <div class="d-flex justify-content-between align-items-center mb-2">
      <strong style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);">Items</strong>
      <button class="btn btn-sm" style="background:var(--htk-primary);color:#fff;" onclick="addFacturaItem()">
       <i class="bi bi-plus-lg"></i> Agregar
      </button>
     </div>
     <div id="factItemsContainer" style="max-height:300px;overflow-y:auto;">
     </div>
    </div>

    <!-- Totals preview -->
    <div class="mt-3 p-3" style="background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.05);">
     <div class="d-flex justify-content-end gap-4">
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.4);">Subtotal</small>
       <div id="factPreviewSub" style="font-weight:600;">$0</div>
      </div>
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.4);">IVA 19%</small>
       <div id="factPreviewIva" style="font-weight:600;">$0</div>
      </div>
      <div style="text-align:right;">
       <small style="color:rgba(255,255,255,0.4);">Descuento</small>
       <div><input type="number" class="form-control form-control-sm" id="factDescuento" value="0" min="0" step="1000" onchange="updateFacturaPreview()" style="width:100px;text-align:right;background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);"></div>
      </div>
      <div style="text-align:right;">
       <small style="color:var(--htk-primary);">TOTAL</small>
       <div id="factPreviewTotal" style="font-size:1.2rem;font-weight:800;color:var(--htk-primary);">$0</div>
      </div>
     </div>
    </div>

    <!-- Notas -->
    <div class="row g-3 mt-3">
     <div class="col-md-6">
      <label class="form-label">Notas</label>
      <textarea class="form-control" id="factNotas" rows="2" placeholder="Condiciones, garantía..." style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);"></textarea>
     </div>
     <div class="col-md-6">
      <label class="form-label">Forma de Pago</label>
      <input type="text" class="form-control" id="factMetodoPago" placeholder="Transferencia · Efectivo · Datafono" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.1);">
     </div>
    </div>
   </div>
   <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="button" class="btn" style="background:var(--htk-primary);color:#fff;" onclick="saveFactura()">Guardar</button>
   </div>
  </div>
 </div>
</div>

<!-- Modal: Ver / Detalle Factura -->
<div class="modal fade" id="facturaViewModal" tabindex="-1">
 <div class="modal-dialog modal-xl modal-dialog-scrollable">
  <div class="modal-content">
   <div class="modal-header">
    <h5 class="modal-title" id="facturaViewTitle">Factura</h5>
    <div class="d-flex gap-2" id="factViewActions">
     <button class="btn btn-sm btn-outline-light" onclick="imprimirFactura(currentFactViewId)" title="Imprimir"><i class="bi bi-printer"></i></button>
     <button class="btn btn-sm btn-outline-success" onclick="enviarFacturaWhatsApp(currentFactViewId)" title="Enviar WhatsApp"><i class="bi bi-whatsapp"></i></button>
     <button class="btn btn-sm btn-outline-warning" onclick="emitirFactura(currentFactViewId)" title="Emitir" id="btnEmitirFact"><i class="bi bi-send"></i></button>
     <button class="btn btn-sm btn-outline-success" onclick="pagarFactura(currentFactViewId)" title="Pagar" id="btnPagarFact"><i class="bi bi-check-circle"></i></button>
     <button class="btn btn-sm btn-outline-danger" onclick="anularFactura(currentFactViewId)" title="Anular"><i class="bi bi-x-circle"></i></button>
     <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
   </div>
   <div class="modal-body p-0">
    <iframe id="facturaPreviewIframe" style="width:100%;height:75vh;border:none;background:#fff;" srcdoc="<p style='text-align:center;padding:40px;color:#999;font-family:sans-serif;'>Cargando factura...</p>"></iframe>
   </div>
  </div>
 </div>
</div>
