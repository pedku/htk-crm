<div id="tab-leads" class="tab-content">
 <div class="d-flex justify-content-between align-items-center mb-3">
 <h3 class="page-title mb-0"><i class="bi bi-graph-up-arrow"></i> Prospectos (Leads)</h3>
 <button class="btn btn-htk" onclick="showModal('lead', null)"><i class="bi bi-plus-lg"></i> Nuevo Prospecto</button>
 </div>
 <div id="leadsLoading" class="loading-overlay">
 <span class="spinner-border spinner-border-sm"></span> Cargando prospectos...
 </div>
 <div id="leadsContent" style="display:none;" class="table-container">
 <div class="d-flex justify-content-between mb-3">
 <input class="search-box" id="leadSearch" placeholder="Buscar prospecto..." onkeyup="renderLeads()" style="width:250px;">
 <select class="form-select" id="leadEstadoFilter" onchange="renderLeads()" style="width:160px;">
 <option value="">Todos los estados</option>
 <option value="nuevo">Nuevo</option>
 <option value="contactado">Contactado</option>
 <option value="cotizado">Cotizado</option>
 <option value="negociacion">Negociación</option>
 <option value="ganado">Ganado</option>
 <option value="perdido">Perdido</option>
 <option value="cliente">Cliente</option>
 </select>
 <select class="form-select" id="leadServicioFilter" onchange="renderLeads()" style="width:180px;">
 <option value="">Todos los servicios</option>
 <option value="automatizacion">Automatización</option>
 <option value="iot">IoT</option>
 <option value="mantenimiento">Mantenimiento</option>
 <option value="cargadores">Cargadores</option>
 <option value="varios">Varios</option>
 </select>
 <select class="form-select" id="leadSegmentFilter" onchange="renderLeads()" style="width:180px;" data-segments="true" data-placeholder="Todos los segmentos"></select>
 </div>
 <div style="overflow-x:auto;">
 <table class="table table-hover">
 <thead><tr><th>ID</th><th>Nombre</th><th>Contacto</th><th>Segmento</th><th>Línea</th><th>Estado</th><th>Valor Est.</th><th>Creado</th><th>Acciones</th></tr></thead>
 <tbody id="leadsBody"></tbody>
 </table>
 </div>
 <div id="leadsEmpty" class="empty-state" style="display:none;">
 <i class="bi bi-graph-up-arrow"></i>
 <p>No hay prospectos aún</p>
 <button class="btn btn-htk" onclick="showModal('lead',null)"><i class="bi bi-plus-lg"></i> Nuevo Prospecto</button>
 <button class="btn btn-htk btn-sm" onclick="showModal('lead')"><i class="bi bi-plus-lg"></i> Agregar primer prospecto</button>
</div>
 </div>
 </div>
