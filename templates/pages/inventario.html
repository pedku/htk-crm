<div id="tab-inventario" class="tab-content">

 <div class="d-flex justify-content-between align-items-center mb-3">
  <div>
   <h3 class="page-title mb-0"><i class="bi bi-box-seam"></i> Inventario</h3>
   <small id="invBajoStockBadge" style="display:none;" class="badge bg-danger mt-1"></small>
  </div>
  <div class="d-flex gap-2 align-items-center">
   <input type="text" id="invSearch" class="search-box" style="width:200px;" placeholder="Buscar..." oninput="loadInventario()">
   <select id="invCategoriaFilter" class="form-select" style="width:140px;" onchange="loadInventario()">
    <option value="">Todas categorías</option>
   </select>
   <button class="btn btn-htk" onclick="showInventarioModal()"><i class="bi bi-plus-lg"></i> Nuevo item</button>
  </div>
 </div>

 <div class="table-container">
  <div class="table-responsive">
   <table class="table table-hover align-middle mb-0">
    <thead>
     <tr>
      <th>Código</th>
      <th>Nombre</th>
      <th>Categoría</th>
      <th>Stock</th>
      <th>Stock Mín</th>
      <th>Proveedor</th>
      <th>Costo Unit.</th>
      <th>Ubicación</th>
      <th style="width:120px;">Acciones</th>
     </tr>
    </thead>
    <tbody id="invTableBody">
     <tr><td colspan="9" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span> Cargando...</td></tr>
    </tbody>
   </table>
  </div>
 </div>

</div>
